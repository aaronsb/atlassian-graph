<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Atlassian GraphQL Schema Graph</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --panel: #13131c;
      --border: #26263a;
      --text: #d7d7e0;
      --muted: #7a7a92;
      --accent: #7aa2f7;
    }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }
    #scene-container {
      position: fixed; top: 0; bottom: 0; left: 0; right: 380px;
      background: var(--bg);
    }
    #scene-container canvas { display: block; }
    #label-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
    }
    #sidebar {
      position: fixed; top: 0; bottom: 0; right: 0; width: 380px;
      background: var(--panel); border-left: 1px solid var(--border);
      padding: 16px; overflow-y: auto; box-sizing: border-box;
    }
    #header {
      position: fixed; top: 12px; left: 12px;
      background: rgba(19,19,28,0.85);
      border: 1px solid var(--border); padding: 10px 14px; border-radius: 4px;
      backdrop-filter: blur(6px);
      pointer-events: none;
    }
    #header h1 { margin: 0 0 4px; font-size: 13px; font-weight: 600; letter-spacing: 0.3px; }
    #header .stats { color: var(--muted); font-size: 11px; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg); z-index: 100; color: var(--muted);
      font-size: 14px; gap: 12px;
    }
    #loading .bar {
      width: 280px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden;
    }
    #loading .fill { height: 100%; width: 0%; background: var(--accent); transition: width 120ms linear; }
    h2 { font-size: 16px; margin: 0 0 6px; color: var(--text); word-break: break-all; }
    .kind {
      display: inline-block; font-size: 10px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px; margin-right: 8px;
    }
    .cat-badge {
      display: inline-block; padding: 2px 8px; border-radius: 3px;
      font-size: 10px; margin-bottom: 12px; color: #000; font-weight: 600;
    }
    .desc { color: var(--muted); font-size: 12px; line-height: 1.5; margin: 0 0 14px; }
    .section-header {
      font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.5px; margin: 18px 0 6px;
    }
    .field { padding: 6px 0; border-bottom: 1px solid var(--border); }
    .field:last-child { border-bottom: none; }
    .field-name { color: var(--text); font-weight: 500; }
    .field-type {
      color: var(--accent); font-family: "SF Mono", Menlo, monospace;
      font-size: 11px; margin-top: 2px;
    }
    .field-type.linked { cursor: pointer; }
    .field-type.linked:hover { text-decoration: underline; }
    .field-desc { color: var(--muted); font-size: 11px; margin-top: 3px; }
    .empty { color: var(--muted); font-size: 12px; font-style: italic; }
    .legend-item {
      display: flex; align-items: center; font-size: 11px; margin: 3px 0;
      color: var(--muted); cursor: pointer;
    }
    .legend-item:hover { color: var(--text); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }
    .hover-label {
      background: rgba(10,10,15,0.9); border: 1px solid var(--border);
      color: var(--text); padding: 3px 8px; border-radius: 3px;
      font-size: 11px; font-family: "SF Mono", Menlo, monospace;
      white-space: nowrap; transform: translate(-50%, -140%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div id="loading-text">Initializing…</div>
    <div class="bar"><div class="fill" id="loading-fill"></div></div>
  </div>

  <div id="scene-container">
    <div id="label-layer"></div>
  </div>

  <div id="header">
    <h1>Atlassian GraphQL Schema</h1>
    <div class="stats" id="stats">—</div>
  </div>

  <div id="sidebar">
    <div id="details"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/renderers/CSS2DRenderer.js"></script>

  <script>
    // =========================================================================
    // Configuration
    // =========================================================================

    const params = new URLSearchParams(location.search);
    const NODE_CAP = parseInt(params.get('nodes') || '1500', 10);
    const LAYOUT_ITERATIONS = parseInt(params.get('iters') || '800', 10);

    // =========================================================================
    // Category patterns — bucket TYPE names by convention
    // =========================================================================

    const CATEGORIES = {
      core_products:      { label: 'Core Products',        patterns: [/^Jira/, /^Confluence/, /^Compass/, /^Bitbucket/, /^Opsgenie/, /^Trello/] },
      identity_user:      { label: 'Identity & User',      patterns: [/^User/, /^Tenant/, /^Identity/, /^AuthenticationContext/, /^Account/] },
      search_discovery:   { label: 'Search & Discovery',   patterns: [/Search/, /^Nlp/, /^Suggest/, /^Discover/] },
      development_devops: { label: 'Development / DevOps', patterns: [/^DevOps/, /^Dev[A-Z]/, /^Code/, /^Dvcs/, /^Repository/, /^PullRequest/, /^Build/, /^Deployment/, /^Pipeline/] },
      project_work:       { label: 'Project & Work',       patterns: [/^Project/, /^Board/, /^Sprint/, /^Roadmap/, /^Epic/, /^Backlog/] },
      content_knowledge:  { label: 'Content & Knowledge',  patterns: [/^Page/, /^Space/, /^KnowledgeBase/, /^Template/, /^Content/, /^Article/] },
      ai_intelligence:    { label: 'AI & Intelligence',    patterns: [/^AgentAI/, /^AgentStudio/, /^Devai/, /^Convoai/, /^Intent/, /^VirtualAgent/, /^Ai[A-Z]/, /AIConfig/, /^Nlp/] },
      apps_marketplace:   { label: 'Apps & Marketplace',   patterns: [/^Marketplace/, /^Ecosystem/, /^Extension/, /^Plugin/, /^Forge/] },
      feeds_activity:     { label: 'Feeds & Activity',     patterns: [/Feed$/, /^Activity/, /^Activities/, /^Notification/, /^Social/] },
      analytics_insights: { label: 'Analytics & Insights', patterns: [/^AVP/, /^Polaris/, /^Mercury/, /^Insights/, /^ContentAnalytics/, /Analytics$/, /Metrics$/, /^Loom/] },
      collaboration:      { label: 'Collaboration',        patterns: [/^Comment/, /^Collab/, /^Stakeholder/, /^Mention/, /^Reaction/] },
      administration:     { label: 'Administration',       patterns: [/^Admin/, /^Settings/, /^Organization/, /^SiteSettings/, /^OrgPolicy/, /^Classification/, /^Audit/] },
      specialized_tools:  { label: 'Specialized Tools',    patterns: [/^Radar/, /^Shepherd/, /^Playbook/, /^Glance/, /^Catchup/, /^AssetsDM/, /^Townsquare/, /^Goal/] },
      support_help:       { label: 'Support & Help',       patterns: [/^Help/, /^CustomerSupport/, /^CustomerService/, /^JsmChat/, /^Spf/] },
      meta_system:        { label: 'Meta / System',        patterns: [/^Echo$/, /^Diagnostics/, /^Sandbox/, /^Node$/, /^PageInfo$/, /Connection$/, /Edge$/] },
    };

    const CATEGORY_ORDER = [
      'core_products', 'project_work', 'content_knowledge', 'identity_user',
      'search_discovery', 'development_devops', 'ai_intelligence', 'collaboration',
      'analytics_insights', 'apps_marketplace', 'feeds_activity', 'administration',
      'specialized_tools', 'support_help', 'meta_system', 'uncategorized',
    ];

    const CATEGORY_COLORS = {
      core_products:      '#4c9aff',
      identity_user:      '#f06595',
      search_discovery:   '#ffd43b',
      development_devops: '#51cf66',
      project_work:       '#ff922b',
      content_knowledge:  '#3bc9db',
      ai_intelligence:    '#b197fc',
      apps_marketplace:   '#ff6b9d',
      feeds_activity:     '#63e6be',
      analytics_insights: '#ffc078',
      collaboration:      '#94d82d',
      administration:     '#a18072',
      specialized_tools:  '#868e96',
      support_help:       '#ffa8a8',
      meta_system:        '#495057',
      uncategorized:      '#2b2b3a',
    };

    // =========================================================================
    // Helpers
    // =========================================================================

    function categorize(name) {
      for (const [cat, info] of Object.entries(CATEGORIES)) {
        for (const re of info.patterns) if (re.test(name)) return cat;
      }
      return 'uncategorized';
    }

    function unwrap(typeRef) {
      while (typeRef && typeRef.ofType) typeRef = typeRef.ofType;
      return typeRef ? typeRef.name : null;
    }

    function renderTypeRef(typeRef) {
      if (!typeRef) return '?';
      if (typeRef.kind === 'NON_NULL') return renderTypeRef(typeRef.ofType) + '!';
      if (typeRef.kind === 'LIST') return '[' + renderTypeRef(typeRef.ofType) + ']';
      return typeRef.name || '?';
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }

    function isRelayScaffold(name) {
      return /Connection$/.test(name) || /Edge$/.test(name) || name === 'PageInfo';
    }

    function setLoading(text, pct) {
      const t = document.getElementById('loading-text');
      const f = document.getElementById('loading-fill');
      if (t) t.textContent = text;
      if (f && pct != null) f.style.width = Math.min(100, Math.max(0, pct)) + '%';
    }

    const yieldToUI = () => new Promise(r => setTimeout(r, 0));

    // =========================================================================
    // Layout Worker — runs ngraph.forcelayout off the main thread
    //
    // Why vendored bundles instead of CDN: the published ngraph.forcelayout@3.x
    // dist/*.js contains a literal JS syntax error (`var nodeMass = if (...)`)
    // which survives minification by accidentally producing a function that
    // returns NaN. The npm *source* is fine. We esbuild the source into
    // `vendor/` once and serve it as same-origin via express.static.
    // Rebuild: `npx esbuild --bundle --format=iife --global-name=X src > vendor/X.js`
    // =========================================================================

    const WORKER_SRC = `
      importScripts('${location.origin}/vendor/ngraph.graph.js');
      importScripts('${location.origin}/vendor/ngraph.forcelayout.js');

      self.onmessage = (e) => {
        const { nodes, edges, iterations } = e.data;
        const graph = createGraph();
        for (const id of nodes) graph.addNode(id);
        for (const [s, t] of edges) graph.addLink(s, t);

        const layout = ngraphCreateLayout(graph, {
          dimensions: 3,
          springLength: 30,
          springCoefficient: 0.0008,
          dragCoefficient: 0.02,
          gravity: -1.2,
          theta: 0.8,
        });

        const report = Math.max(1, Math.floor(iterations / 40));
        for (let i = 0; i < iterations; i++) {
          layout.step();
          if (i % report === 0) {
            self.postMessage({ type: 'progress', iteration: i, total: iterations });
          }
        }

        const positions = {};
        graph.forEachNode(n => {
          const p = layout.getNodePosition(n.id);
          positions[n.id] = [p.x, p.y, p.z];
        });
        self.postMessage({ type: 'done', positions });
      };
    `;

    function runLayoutInWorker(nodeIds, edgeList, iterations, onProgress) {
      return new Promise((resolve, reject) => {
        const blob = new Blob([WORKER_SRC], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));
        worker.onerror = (err) => { worker.terminate(); reject(err); };
        worker.onmessage = (e) => {
          if (e.data.type === 'progress') {
            onProgress(e.data.iteration, e.data.total);
          } else if (e.data.type === 'done') {
            worker.terminate();
            resolve(e.data.positions);
          }
        };
        worker.postMessage({ nodes: nodeIds, edges: edgeList, iterations });
      });
    }

    // =========================================================================
    // Main
    // =========================================================================

    // Module-scope state (shared between main() and interaction handlers)
    let scene, camera, renderer, labelRenderer, controls, raycaster, mouse;
    let instancedMesh, lineSegments, edgeColorAttr;
    let nodeIndex;           // Map<string, NodeRecord>  (by type name)
    let instanceToNodeId;    // Array<string>  (instance index -> node id)
    let nodeInstanceIds;     // Map<string, number>  (node id -> instance index)
    let baseInstanceColors;  // Float32Array, 3 floats per instance — immutable reference colors
    let baseEdgeColors;      // Float32Array, 3 floats per vertex (2 vertices per edge)
    let hoverLabelEl;        // CSS2DObject div for hover label
    let selectedId = null;
    let hoveredId = null;

    async function main() {
      setLoading('Fetching schema…', 2);
      const res = await fetch('/introspection-schema.json');
      if (!res.ok) throw new Error('Failed to load schema (' + res.status + ')');

      setLoading('Parsing schema…', 10);
      await yieldToUI();
      const data = await res.json();
      const schema = data.__schema || (data.data && data.data.__schema);
      if (!schema) throw new Error('Invalid schema format');

      setLoading('Filtering types…', 15);
      await yieldToUI();
      const navKinds = new Set(['OBJECT', 'INTERFACE', 'UNION']);
      const candidates = schema.types.filter(t =>
        !t.name.startsWith('__') && navKinds.has(t.kind) && !isRelayScaffold(t.name)
      );
      const candIndex = new Map(candidates.map(t => [t.name, t]));
      const totalEligible = candidates.length;

      setLoading('Computing connectivity…', 20);
      await yieldToUI();
      const degrees = new Map(candidates.map(t => [t.name, 0]));
      for (const t of candidates) {
        for (const f of t.fields || []) {
          const target = unwrap(f.type);
          if (target && candIndex.has(target) && target !== t.name) {
            degrees.set(t.name, (degrees.get(t.name) || 0) + 1);
            degrees.set(target, (degrees.get(target) || 0) + 1);
          }
        }
      }
      const kept = candidates.slice()
        .sort((a, b) => (degrees.get(b.name) || 0) - (degrees.get(a.name) || 0))
        .slice(0, NODE_CAP);
      const keptIndex = new Map(kept.map(t => [t.name, t]));

      setLoading('Building edge list…', 25);
      await yieldToUI();
      const edgeSet = new Set();
      const edgeList = [];
      for (const t of kept) {
        for (const f of t.fields || []) {
          const target = unwrap(f.type);
          if (!target || target === t.name || !keptIndex.has(target)) continue;
          const key = t.name + '\x01' + target;
          if (edgeSet.has(key)) continue;
          edgeSet.add(key);
          edgeList.push([t.name, target]);
        }
      }

      document.getElementById('stats').textContent =
        kept.length.toLocaleString() + ' of ' + totalEligible.toLocaleString() +
        ' types · ' + edgeList.length.toLocaleString() + ' relationships';

      // Populate nodeIndex for later interaction
      nodeIndex = new Map();
      for (const t of kept) {
        nodeIndex.set(t.name, {
          id: t.name,
          kind: t.kind,
          description: t.description || '',
          fields: t.fields || [],
          category: categorize(t.name),
          degree: degrees.get(t.name) || 0,
        });
      }

      setLoading('Running force layout (0%)…', 30);
      await yieldToUI();
      const positions = await runLayoutInWorker(
        kept.map(t => t.name),
        edgeList,
        LAYOUT_ITERATIONS,
        (iter, total) => {
          const frac = iter / total;
          setLoading('Running force layout (' + Math.round(frac * 100) + '%)…', 30 + frac * 60);
        }
      );

      setLoading('Building 3D scene…', 92);
      await yieldToUI();
      buildScene(kept, edgeList, positions);
      setLoading('Done', 100);
      await yieldToUI();
      document.getElementById('loading').style.display = 'none';

      clearSelection();
      animate();
    }

    // =========================================================================
    // Three.js scene construction
    // =========================================================================

    function buildScene(kept, edgeList, positions) {
      const container = document.getElementById('scene-container');
      const w = container.clientWidth;
      const h = container.clientHeight;

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a0f);

      camera = new THREE.PerspectiveCamera(55, w / h, 1, 100000);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(w, h);
      container.appendChild(renderer.domElement);

      labelRenderer = new THREE.CSS2DRenderer();
      labelRenderer.setSize(w, h);
      labelRenderer.domElement.style.position = 'absolute';
      labelRenderer.domElement.style.top = '0';
      labelRenderer.domElement.style.left = '0';
      labelRenderer.domElement.style.pointerEvents = 'none';
      container.appendChild(labelRenderer.domElement);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.rotateSpeed = 0.6;

      // ---- Nodes: single InstancedMesh, sphere per type ----
      const geom = new THREE.IcosahedronGeometry(1, 1); // 80 tris per instance
      const mat = new THREE.MeshBasicMaterial({ vertexColors: false });
      instancedMesh = new THREE.InstancedMesh(geom, mat, kept.length);
      instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

      instanceToNodeId = new Array(kept.length);
      nodeInstanceIds = new Map();
      baseInstanceColors = new Float32Array(kept.length * 3);

      const m = new THREE.Matrix4();
      const color = new THREE.Color();
      const bounds = { min: [Infinity, Infinity, Infinity], max: [-Infinity, -Infinity, -Infinity] };

      for (let i = 0; i < kept.length; i++) {
        const node = kept[i];
        const pos = positions[node.name];
        if (!pos) continue;
        const [x, y, z] = pos;

        // Size scales with sqrt(degree) — dense hubs pop without eating the frame
        const degree = nodeIndex.get(node.name).degree;
        const scale = 0.8 + Math.sqrt(degree) * 0.3;

        m.makeScale(scale, scale, scale);
        m.setPosition(x, y, z);
        instancedMesh.setMatrixAt(i, m);

        const cat = nodeIndex.get(node.name).category;
        color.set(CATEGORY_COLORS[cat] || CATEGORY_COLORS.uncategorized);
        instancedMesh.setColorAt(i, color);
        baseInstanceColors[i * 3]     = color.r;
        baseInstanceColors[i * 3 + 1] = color.g;
        baseInstanceColors[i * 3 + 2] = color.b;

        instanceToNodeId[i] = node.name;
        nodeInstanceIds.set(node.name, i);

        if (x < bounds.min[0]) bounds.min[0] = x;
        if (y < bounds.min[1]) bounds.min[1] = y;
        if (z < bounds.min[2]) bounds.min[2] = z;
        if (x > bounds.max[0]) bounds.max[0] = x;
        if (y > bounds.max[1]) bounds.max[1] = y;
        if (z > bounds.max[2]) bounds.max[2] = z;
      }
      instancedMesh.instanceMatrix.needsUpdate = true;
      if (instancedMesh.instanceColor) instancedMesh.instanceColor.needsUpdate = true;
      scene.add(instancedMesh);

      // ---- Edges: single LineSegments buffer ----
      const posArr = new Float32Array(edgeList.length * 6);
      baseEdgeColors = new Float32Array(edgeList.length * 6);
      const sc = new THREE.Color();
      const tc = new THREE.Color();
      for (let i = 0; i < edgeList.length; i++) {
        const [src, tgt] = edgeList[i];
        const sp = positions[src]; const tp = positions[tgt];
        if (!sp || !tp) continue;
        posArr[i * 6]     = sp[0];
        posArr[i * 6 + 1] = sp[1];
        posArr[i * 6 + 2] = sp[2];
        posArr[i * 6 + 3] = tp[0];
        posArr[i * 6 + 4] = tp[1];
        posArr[i * 6 + 5] = tp[2];

        sc.set(CATEGORY_COLORS[nodeIndex.get(src).category] || CATEGORY_COLORS.uncategorized);
        tc.set(CATEGORY_COLORS[nodeIndex.get(tgt).category] || CATEGORY_COLORS.uncategorized);
        // Dim edges default to a faded gray-blue gradient between endpoints
        const dim = 0.25;
        baseEdgeColors[i * 6]     = sc.r * dim;
        baseEdgeColors[i * 6 + 1] = sc.g * dim;
        baseEdgeColors[i * 6 + 2] = sc.b * dim;
        baseEdgeColors[i * 6 + 3] = tc.r * dim;
        baseEdgeColors[i * 6 + 4] = tc.g * dim;
        baseEdgeColors[i * 6 + 5] = tc.b * dim;
      }
      const edgeGeom = new THREE.BufferGeometry();
      edgeGeom.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
      edgeColorAttr = new THREE.BufferAttribute(baseEdgeColors.slice(), 3);
      edgeGeom.setAttribute('color', edgeColorAttr);
      const edgeMat = new THREE.LineBasicMaterial({
        vertexColors: true,
        transparent: true,
        opacity: 0.7,
      });
      lineSegments = new THREE.LineSegments(edgeGeom, edgeMat);
      scene.add(lineSegments);

      // Edge positions stay fixed; we only mutate colors on selection.
      edgeGeom.setAttribute('position', new THREE.BufferAttribute(posArr, 3));

      // ---- Camera framing ----
      const cx = (bounds.min[0] + bounds.max[0]) / 2;
      const cy = (bounds.min[1] + bounds.max[1]) / 2;
      const cz = (bounds.min[2] + bounds.max[2]) / 2;
      const span = Math.max(
        bounds.max[0] - bounds.min[0],
        bounds.max[1] - bounds.min[1],
        bounds.max[2] - bounds.min[2]
      );
      controls.target.set(cx, cy, cz);
      camera.position.set(cx, cy, cz + span * 1.3);
      camera.near = 1;
      camera.far = span * 20;
      camera.updateProjectionMatrix();
      controls.update();

      // ---- Interaction ----
      raycaster = new THREE.Raycaster();
      raycaster.params.Points = { threshold: 2 };
      mouse = new THREE.Vector2();

      // Hover label (CSS2D)
      const hoverDiv = document.createElement('div');
      hoverDiv.className = 'hover-label';
      hoverDiv.style.display = 'none';
      hoverLabelEl = new THREE.CSS2DObject(hoverDiv);
      hoverLabelEl.userData.domEl = hoverDiv;
      scene.add(hoverLabelEl);

      renderer.domElement.addEventListener('click', onCanvasClick);
      renderer.domElement.addEventListener('mousemove', onCanvasHover);
      window.addEventListener('resize', onResize);
    }

    function onResize() {
      const container = document.getElementById('scene-container');
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      labelRenderer.setSize(w, h);
    }

    function pickInstance(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(instancedMesh);
      if (hits.length === 0) return null;
      return instanceToNodeId[hits[0].instanceId];
    }

    function onCanvasClick(e) {
      const hit = pickInstance(e);
      if (hit) {
        showDetails(hit);
      } else {
        clearSelection();
      }
    }

    function onCanvasHover(e) {
      const hit = pickInstance(e);
      if (hit === hoveredId) return;
      hoveredId = hit;
      const dom = hoverLabelEl.userData.domEl;
      if (hit) {
        dom.textContent = hit;
        dom.style.display = 'block';
        const idx = nodeInstanceIds.get(hit);
        const m = new THREE.Matrix4();
        instancedMesh.getMatrixAt(idx, m);
        const pos = new THREE.Vector3().setFromMatrixPosition(m);
        hoverLabelEl.position.copy(pos);
      } else {
        dom.style.display = 'none';
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    // =========================================================================
    // Selection / highlight
    // =========================================================================

    function clearSelection() {
      selectedId = null;
      // Restore all instance colors
      const c = new THREE.Color();
      for (let i = 0; i < instanceToNodeId.length; i++) {
        c.setRGB(baseInstanceColors[i * 3], baseInstanceColors[i * 3 + 1], baseInstanceColors[i * 3 + 2]);
        instancedMesh.setColorAt(i, c);
      }
      instancedMesh.instanceColor.needsUpdate = true;
      // Restore edge colors
      edgeColorAttr.array.set(baseEdgeColors);
      edgeColorAttr.needsUpdate = true;

      const details = document.getElementById('details');
      details.innerHTML =
        '<div class="empty">Click any node to inspect it. Click a field\'s type to jump.</div>' +
        '<div class="section-header">Categories</div>' +
        '<div id="legend"></div>';
      buildLegend();
    }

    function showDetails(id) {
      selectedId = id;
      const node = nodeIndex.get(id);
      if (!node) return;

      // Highlight: selected + neighborhood bright, everything else dimmed
      const neighbors = new Set([id]);
      // Walk edges to find neighbors
      const positions = lineSegments.geometry.attributes.position.array;
      // (We don't have a per-edge node id lookup; rebuild from node.fields for now — cheaper than scanning edges)
      for (const f of node.fields) {
        const t = unwrap(f.type);
        if (t && nodeIndex.has(t)) neighbors.add(t);
      }
      // Also upstream: any type whose field returns this id
      for (const [otherId, other] of nodeIndex) {
        if (otherId === id) continue;
        for (const f of other.fields) {
          if (unwrap(f.type) === id) { neighbors.add(otherId); break; }
        }
      }

      const c = new THREE.Color();
      for (let i = 0; i < instanceToNodeId.length; i++) {
        const nid = instanceToNodeId[i];
        if (neighbors.has(nid)) {
          c.setRGB(baseInstanceColors[i * 3], baseInstanceColors[i * 3 + 1], baseInstanceColors[i * 3 + 2]);
        } else {
          c.setRGB(
            baseInstanceColors[i * 3]     * 0.12,
            baseInstanceColors[i * 3 + 1] * 0.12,
            baseInstanceColors[i * 3 + 2] * 0.12
          );
        }
        if (nid === id) c.multiplyScalar(1.4);
        instancedMesh.setColorAt(i, c);
      }
      instancedMesh.instanceColor.needsUpdate = true;

      // Pan camera to selected node
      const idx = nodeInstanceIds.get(id);
      const m = new THREE.Matrix4();
      instancedMesh.getMatrixAt(idx, m);
      const targetPos = new THREE.Vector3().setFromMatrixPosition(m);
      const camOffset = new THREE.Vector3().subVectors(camera.position, controls.target);
      controls.target.copy(targetPos);
      camera.position.copy(targetPos).add(camOffset.setLength(Math.max(60, camOffset.length() * 0.7)));

      renderDetailsPanel(node);
    }

    function renderDetailsPanel(node) {
      const color = CATEGORY_COLORS[node.category];
      const catLabel = (CATEGORIES[node.category] && CATEGORIES[node.category].label) || node.category;

      const fieldsHtml = (node.fields || []).map(f => {
        const target = unwrap(f.type);
        const exists = target && nodeIndex.has(target);
        const cls = exists ? 'field-type linked' : 'field-type';
        return (
          '<div class="field">' +
            '<div class="field-name">' + escapeHtml(f.name) + '</div>' +
            '<div class="' + cls + '" data-target="' + escapeHtml(target || '') + '">' +
              escapeHtml(renderTypeRef(f.type)) +
            '</div>' +
            (f.description ? '<div class="field-desc">' + escapeHtml(f.description) + '</div>' : '') +
          '</div>'
        );
      }).join('') || '<div class="empty">(no fields)</div>';

      document.getElementById('details').innerHTML =
        '<div class="kind">' + node.kind + '</div>' +
        '<h2>' + escapeHtml(node.id) + '</h2>' +
        '<div class="cat-badge" style="background: ' + color + ';">' + catLabel + '</div>' +
        (node.description ? '<div class="desc">' + escapeHtml(node.description) + '</div>' : '') +
        '<div class="section-header">Fields (' + (node.fields || []).length + ')</div>' +
        fieldsHtml;

      document.querySelectorAll('.field-type.linked').forEach(el => {
        el.addEventListener('click', () => {
          const target = el.dataset.target;
          if (nodeIndex.has(target)) showDetails(target);
        });
      });
    }

    function buildLegend() {
      const legend = document.getElementById('legend');
      if (!legend) return;
      const counts = {};
      for (const node of nodeIndex.values()) {
        counts[node.category] = (counts[node.category] || 0) + 1;
      }
      legend.innerHTML = CATEGORY_ORDER
        .filter(c => counts[c])
        .map(c => (
          '<div class="legend-item" data-cat="' + c + '">' +
            '<span class="legend-dot" style="background: ' + CATEGORY_COLORS[c] + ';"></span>' +
            '<span>' + ((CATEGORIES[c] && CATEGORIES[c].label) || c) + ' (' + counts[c] + ')</span>' +
          '</div>'
        )).join('');
    }

    // =========================================================================
    // Boot
    // =========================================================================

    main().catch(err => {
      setLoading('Error: ' + err.message, 0);
      console.error(err);
    });
  </script>
</body>
</html>
